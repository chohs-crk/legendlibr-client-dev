<section id="page-create-prompt" class="page" aria-label="캐릭터 정보 입력 페이지">
    <div class="content">
        <div class="scroll-area">
            <div class="create-prompt-shell">
                <section class="selected-info-box" aria-label="선택된 기원과 지역">
                    <div class="info-stack">
                        <div class="info-line info-block origin-chip-wrap">
                            <div class="value" id="originName"></div>
                        </div>

                        <button
                            type="button"
                            class="info-line info-block region-chip-button"
                            id="regionInfoButton"
                            aria-expanded="false"
                            aria-controls="regionDetailPanel"
                        >
                            <span class="value" id="regionName"></span>
                            <span class="region-chip-icon">⌄</span>
                        </button>
                    </div>

                    <div id="regionDetailPanel" class="region-detail-panel" hidden>
                        <div class="region-detail-head">
                            <div class="region-detail-title" id="regionDetailTitle"></div>
                            <div class="region-detail-meta" id="regionDetailMeta"></div>
                        </div>
                        <div class="region-detail-desc" id="regionDetailDesc"></div>
                    </div>
                </section>

                <section class="prompt-input-wrap">
                    <div class="field-block">
                        <div class="field-head">
                            <label class="input-label" for="nameInput">캐릭터 이름</label>
                            <div class="field-counter"><span id="nameCount">0</span>/<span id="nameMax">15</span></div>
                        </div>
                        <input
                            id="nameInput"
                            maxlength="15"
                            class="text-input"
                            value="프리무스"
                            autocomplete="off"
                            spellcheck="false"
                        />
                    </div>

                    <div class="field-block">
                        <div class="field-head">
                            <label class="input-label" for="promptInput">캐릭터 설명</label>
                            <div class="field-counter"><span id="promptByteCount">0</span>/<span id="promptByteMax">1000</span> byte</div>
                        </div>
                        <textarea
                            id="promptInput"
                            maxlength="1000"
                            class="text-area"
                            rows="4"
                            spellcheck="false"
                        >옛날 옛날 한 천사가 살았다.</textarea>
                    </div>

                    <button id="btnNext" class="btn primary prompt-next-btn mt-30">다음</button>
                </section>
            </div>
        </div>
    </div>
</section>
