<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>캐릭터 결말 생성중...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="/stylesheet/base/common.css">
    <link rel="stylesheet" href="/stylesheet/base/index.css">

    <style>
        body {
            margin: 0;
            color: white;
            font-family: sans-serif;
        }

        #loadingBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: .9;
        }

        .spinner {
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #fff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            margin: 0 auto 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-root">
        <div class="bg-frame"></div>

        <div id="loadingBox">
            <div class="spinner"></div>
            <div>캐릭터의 이야기를 마무리하고 있습니다.</div>
            <div>잠시만 기다려 주세요.</div>

            <button id="btnGoHome"
                    style="
                margin-top:20px;
                padding:8px 16px;
                background:#ffffff22;
                border:1px solid #fff;
                color:#fff;
                border-radius:6px;
                cursor:pointer;
            ">
                홈으로 이동
            </button>
        </div>

    </div>

    <script type="module">
        import { apiFetch } from "/base/api.js";

        const PENDING_FINAL_KEY = "pendingFinalPreview";

        function getPendingRawName() {
            return (
                sessionStorage.getItem("displayNameRaw") ||
                sessionStorage.getItem("realName") ||
                "새 캐릭터"
            );
        }

        function savePendingFinalPreview(rawName) {
            const safeName = String(rawName || "새 캐릭터").trim() || "새 캐릭터";

            sessionStorage.setItem(PENDING_FINAL_KEY, JSON.stringify({
                rawName: safeName,
                image: {
                    type: "default",
                    key: "base_01",
                    url: ""
                },
                startedAt: Number(sessionStorage.getItem("finalStartedAt")) || Date.now()
            }));
        }

        function clearPendingFinalPreview() {
            sessionStorage.removeItem(PENDING_FINAL_KEY);
        }

        async function gen() {
            try {
                const res = await apiFetch("/create/final", {
                    method: "POST"
                });

                const j = await res.json();

                if (j.status === "waiting") {
                    document.getElementById("loadingBox").innerHTML =
                        `<div>결말을 정리하고 있습니다...</div>
                             <div>곧 완료됩니다.</div>`;
                    return;
                }

                if (j.status === "done") {
                    clearPendingFinalPreview();

                    document.getElementById("loadingBox").innerHTML =
                        `<div>캐릭터 생성이 완료되었습니다.</div>
                             <div>잠시 후 이동합니다.</div>`;

                    setTimeout(() => {
                        sessionStorage.setItem("viewCharId", j.id);
                        sessionStorage.setItem("homeCalled", "false");
                        sessionStorage.removeItem("finalStartedAt");
                        location.href = `/character/${j.id}`;
                    }, 1200);

                    return;
                }

                if (!j.ok) {
                    clearPendingFinalPreview();

                    document.getElementById("loadingBox").innerHTML =
                        `<div>캐릭터 생성이 종료되었습니다.</div>
                             <div>다시 생성할 수 있습니다.</div>
                             <div style="margin-top:12px; opacity:.7;">잠시 후 이동합니다.</div>`;

                    setTimeout(() => {
                        sessionStorage.setItem("homeCalled", "false");
                        sessionStorage.removeItem("finalStartedAt");
                        location.href = "/";
                    }, 2000);

                    return;
                }

                clearPendingFinalPreview();

                document.getElementById("loadingBox").innerHTML =
                    `<div>캐릭터 생성이 완료되었습니다.</div>
                         <div>잠시 후 이동합니다.</div>`;

                setTimeout(() => {
                    sessionStorage.setItem("viewCharId", j.id);
                    sessionStorage.setItem("homeCalled", "false");
                    sessionStorage.removeItem("finalStartedAt");
                    location.href = `/character/${j.id}`;
                }, 1200);

            } catch (err) {
                clearPendingFinalPreview();

                document.getElementById("loadingBox").innerHTML =
                    `<div>처리 중 문제가 발생했습니다.</div>
                         <div>캐릭터 생성은 종료되었습니다.</div>
                         <div style="margin-top:12px; opacity:.7;">잠시 후 이동합니다.</div>`;

                setTimeout(() => {
                    sessionStorage.setItem("homeCalled", "false");
                    sessionStorage.removeItem("finalStartedAt");
                    location.href = "/";
                }, 2500);
            }
        }

        history.replaceState(null, "", "/create");

        if (!sessionStorage.getItem("finalStartedAt")) {
            sessionStorage.setItem("finalStartedAt", Date.now().toString());
        }

        savePendingFinalPreview(getPendingRawName());
        gen();

        const btnGoHome = document.getElementById("btnGoHome");
        btnGoHome?.addEventListener("click", () => {
            savePendingFinalPreview(getPendingRawName());
            sessionStorage.setItem("homeCalled", "false");
            location.href = "/";
        });
    </script>
</body>
</html>
